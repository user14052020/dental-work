services:
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
        INTERNAL_API_URL: http://backend:8100/api/v1
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
      INTERNAL_API_URL: http://backend:8100/api/v1
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "3100:3100"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dental_lab:dental_lab@postgres:5432/dental_lab
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  seed:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dental_lab:dental_lab@postgres:5432/dental_lab
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      POSTGRES_HOST: postgres
    command: ["python", "-m", "app.seeds.seed"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - tools

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dental_lab
      POSTGRES_USER: dental_lab
      POSTGRES_PASSWORD: dental_lab
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_lab -d dental_lab"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  elastic_data:
